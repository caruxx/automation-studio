<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photoshop Link</title>
<style>
  :root{
    --bg: #232323;
    --bg-2: #1c1c1c;
    --bg-3: #2a2a2a;
    --border: #3a3a3a;
    --border-2: #4a4a4a;
    --text: #e0e0e0;
    --text-2: #a0a0a0;
    --text-3: #666;
    --accent: #60a5fa;
    --green: #4ade80;
    --red: #f87171;
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:11px; height:100%; overflow:hidden; }
  body { display:flex; flex-direction:column; padding:8px; box-sizing:border-box; gap:6px; }

  .hdr { display:flex; align-items:center; gap:6px; flex-shrink:0; flex-wrap:wrap; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--text-3); flex-shrink:0; transition:background .2s; }
  .dot.ok { background:var(--green); box-shadow:0 0 4px var(--green); }
  .dot.err { background:var(--red); }
  #status { font-size:10px; color:var(--text-2); letter-spacing:.02em; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .sec { display:flex; flex-direction:column; min-height:0; }
  .sec-hd { display:flex; align-items:center; gap:4px; margin-bottom:4px; font-size:9px; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; flex-wrap:wrap; }
  .sec-hd .sp { flex:1; min-width:0; }
  .sec-hd .label { flex-shrink:0; }
  .sec-hd .actions { display:flex; gap:4px; flex-shrink:0; }

  .btn {
    background:var(--bg-3); color:var(--text); border:1px solid var(--border);
    border-radius:3px; padding:3px 6px; font-size:10px; cursor:pointer;
    font-family:inherit; transition:background .15s,border-color .15s;
    white-space:nowrap;
  }
  .btn:hover { background:#333; border-color:var(--border-2); }
  .btn.mini { padding:2px 6px; font-size:10px; color:var(--text-2); }

  /* 狭い幅 (~260px 以下) ではセクション見出しを折り返し、ボタンを行下に */
  @media (max-width: 260px) {
    .sec-hd .sp { display:none; }
    .sec-hd .actions { width:100%; margin-top:2px; }
    .sec-hd .actions .btn { flex:1; }
  }

  #scripts {
    flex:1; overflow-y:auto; background:var(--bg-2); border:1px solid var(--border);
    border-radius:3px; padding:4px; display:flex; flex-direction:column; gap:3px;
    min-height:60px;
  }
  #scripts .scbtn {
    background:var(--bg-3); color:var(--text); border:1px solid var(--border);
    border-radius:2px; padding:4px 6px; font-size:10px; cursor:pointer;
    text-align:left; font-family:var(--mono);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    transition:background .15s,border-color .15s;
  }
  #scripts .scbtn:hover { background:#333; border-color:var(--accent); color:var(--accent); }
  #scripts .empty { color:var(--text-3); font-style:italic; padding:8px; text-align:center; }
  #folder { font-size:9px; color:var(--text-3); font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }

  #log {
    height:90px; overflow-y:auto; background:var(--bg-2); border:1px solid var(--border);
    border-radius:3px; padding:5px 7px; font-family:var(--mono); font-size:10px;
    line-height:1.45; color:var(--text-2); flex-shrink:0;
  }
  #log::-webkit-scrollbar, #scripts::-webkit-scrollbar { width:5px; }
  #log::-webkit-scrollbar-track, #scripts::-webkit-scrollbar-track { background:transparent; }
  #log::-webkit-scrollbar-thumb, #scripts::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .ln { margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ln .t { color:var(--text-3); margin-right:4px; }
  .ln.info { color:var(--text-2); }
  .ln.done { color:var(--green); }
  .ln.err { color:var(--red); }
  .empty { color:var(--text-3); font-style:italic; }
</style>
</head>
<body>
  <div class="hdr">
    <div class="dot" id="dot"></div>
    <div id="status">起動中...</div>
  </div>

  <div class="sec" style="flex:1; min-height:0;">
    <div class="sec-hd">
      <span class="label">Scripts</span>
      <span class="sp"></span>
      <span class="actions">
        <button class="btn mini" onclick="pickScriptFolder()">フォルダ選択</button>
        <button class="btn mini" onclick="refreshScripts()">更新</button>
      </span>
    </div>
    <div id="folder"></div>
    <div id="scripts"><div class="empty">フォルダ未選択</div></div>
  </div>

  <div class="sec" style="flex-shrink:0;">
    <div class="sec-hd"><span>IPC Activity</span></div>
    <div id="log"><div class="empty">待機中</div></div>
  </div>

  <script src="js/CSInterface.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
