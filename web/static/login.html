<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Automation Studio ログイン</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
  :root{
    --bg-base:#0a0a0a; --bg-surface:#111111; --bg-elevated:#1a1a1a; --bg-overlay:#222222;
    --border-default:#2a2a2a; --border-focus:#3b82f6;
    --text-primary:#f5f5f5; --text-secondary:#a3a3a3; --text-tertiary:#666666;
    --accent-primary:#3b82f6; --accent-primary-hover:#2563eb;
    --accent-success:#22c55e; --accent-danger:#ef4444;
    --radius-md:8px; --radius-lg:12px;
    --space-2:8px; --space-3:12px; --space-4:16px; --space-6:24px;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg-base);color:var(--text-primary);
       font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
  .card{background:var(--bg-surface);border:1px solid var(--border-default);
        border-radius:var(--radius-lg);padding:var(--space-6);width:100%;max-width:380px;
        box-shadow:0 24px 64px rgba(0,0,0,.5)}
  h1{margin:0 0 var(--space-2);font-size:20px;font-weight:700}
  .sub{color:var(--text-secondary);font-size:13px;margin-bottom:var(--space-6);line-height:1.6}
  label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:var(--space-2)}
  input{width:100%;padding:12px;background:var(--bg-elevated);border:1px solid var(--border-default);
        border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;font-family:'SF Mono',Menlo,monospace}
  input:focus{outline:none;border-color:var(--border-focus)}
  button{width:100%;padding:12px;background:var(--accent-primary);color:#fff;border:none;
         border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;margin-top:var(--space-4);
         min-height:44px;transition:background .15s}
  button:hover{background:var(--accent-primary-hover)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .err{color:var(--accent-danger);font-size:13px;margin-top:var(--space-3);min-height:1.4em}
  .hint{color:var(--text-tertiary);font-size:11px;margin-top:var(--space-4);line-height:1.6}
  .hint code{background:var(--bg-elevated);padding:1px 6px;border-radius:4px;font-size:11px}
</style>
</head>
<body>
  <form class="card" onsubmit="return doLogin(event)">
    <h1>Automation Studio ログイン</h1>
    <div class="sub">外出先からアクセスする場合は認証トークンを入力してください。</div>
    <label for="tok">アクセストークン</label>
    <input id="tok" type="password" autocomplete="current-password" required>
    <div class="err" id="err"></div>
    <button id="btn" type="submit">ログイン</button>
    <div class="hint">トークンは設定ディレクトリの <code>auth_token.txt</code> または マスター設定 → リモートアクセスで確認・再生成できます。</div>
  </form>
<script>
async function doLogin(e){
  e.preventDefault();
  const tok=document.getElementById('tok').value.trim();
  const err=document.getElementById('err');const btn=document.getElementById('btn');
  err.textContent='';btn.disabled=true;btn.textContent='確認中...';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok})});
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.detail||'認証失敗');}
    // localStorage にも保存（fetch ヘッダー用）
    localStorage.setItem('orzz_token',tok);
    const next=new URLSearchParams(location.search).get('next')||'/';
    location.href=next;
  }catch(ex){
    err.textContent='⚠ '+(ex.message||'認証失敗');
    btn.disabled=false;btn.textContent='ログイン';
  }
  return false;
}
// PWA: SW 登録
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
